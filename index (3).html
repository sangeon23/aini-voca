<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛你 단어장 · 王心凌</title>
<style>
  :root{
    --bg:#1a1418; --panel:#241b22; --panel2:#2e232b;
    --ink:#f6eef2; --muted:#c7a8b8; --faint:#8c7280;
    --rose:#e89ab5; --rose-d:#d4537e; --rose-deep:#72243e;
    --gold:#e6b34d; --teal:#5dcaa5; --line:rgba(232,154,181,.16);
    --ok:#5dcaa5; --warn:#e6b34d;
    --r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    -webkit-font-smoothing:antialiased}
  body{max-width:680px;margin:0 auto;padding:18px 16px 80px;min-height:100vh}

  /* header */
  .top{text-align:center;padding:14px 0 8px}
  .cn-title{font-family:"Songti SC","STSong",serif;font-size:46px;font-weight:600;
    letter-spacing:.12em;color:var(--rose);line-height:1}
  .kr-title{font-size:15px;color:var(--muted);margin-top:8px;letter-spacing:.06em}
  .artist{font-size:12px;color:var(--faint);margin-top:4px}

  /* progress bar */
  .prog-wrap{margin:18px 0 6px}
  .prog-track{height:6px;background:var(--panel2);border-radius:99px;overflow:hidden}
  .prog-fill{height:100%;width:0;background:linear-gradient(90deg,var(--rose-d),var(--gold));
    border-radius:99px;transition:width .35s ease}
  .prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--faint);margin-top:6px}

  /* level tabs */
  .levels{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0 6px}
  .lvl{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:11px 6px;text-align:center;cursor:pointer;transition:.18s;user-select:none}
  .lvl:hover{border-color:var(--rose-d)}
  .lvl.on{background:var(--panel2);border-color:var(--rose);box-shadow:0 0 0 1px var(--rose) inset}
  .lvl .num{font-size:11px;color:var(--faint);letter-spacing:.1em}
  .lvl.on .num{color:var(--rose)}
  .lvl .nm{font-size:14px;font-weight:600;margin-top:3px}
  .lvl .ct{font-size:11px;color:var(--faint);margin-top:2px}

  /* mode + controls row */
  .ctrl{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:14px 0 4px;justify-content:center}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{background:none;border:none;color:var(--muted);padding:7px 14px;font-size:12.5px;
    cursor:pointer;font-family:inherit}
  .seg button.on{background:var(--rose-deep);color:var(--ink)}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    border-radius:10px;padding:7px 12px;font-size:12.5px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
  .chip:hover{border-color:var(--rose-d);color:var(--ink)}
  .chip.on{background:var(--rose-deep);color:var(--ink);border-color:var(--rose)}

  /* card */
  .stage{margin-top:18px;perspective:1400px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
    min-height:340px;padding:30px 16px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;position:relative;
    cursor:pointer;transition:.18s;overflow:hidden}
  .card:hover{border-color:rgba(232,154,181,.32)}
  .pos-tag{position:absolute;top:14px;left:16px;font-size:11px;color:var(--faint);
    letter-spacing:.08em}
  .fav-btn{position:absolute;top:11px;right:13px;background:none;border:none;
    font-size:20px;cursor:pointer;color:var(--faint);line-height:1;padding:4px}
  .fav-btn.on{color:var(--gold)}

  .hanzi{font-family:"Songti SC","STSong","Noto Serif SC",serif;font-weight:600;
    color:var(--ink);line-height:1.18;word-break:break-word;overflow-wrap:break-word;
    max-width:100%;width:100%;text-align:center}
  .lvl1 .hanzi{font-size:clamp(34px,13vw,74px);letter-spacing:.04em}
  .lvl2 .hanzi{font-size:clamp(26px,8.5vw,48px);letter-spacing:.03em;line-height:1.3}
  .lvl3 .hanzi{font-size:clamp(20px,6vw,33px);letter-spacing:.01em;line-height:1.4}

  .reveal{margin-top:22px;opacity:0;transform:translateY(8px);
    transition:.28s;pointer-events:none;width:100%}
  .reveal.show{opacity:1;transform:none;pointer-events:auto}
  .pinyin{font-size:21px;color:var(--gold);letter-spacing:.04em;font-weight:500}
  .lvl3 .pinyin{font-size:16px;line-height:1.6}
  .reading{font-size:16px;color:var(--rose);margin-top:8px;letter-spacing:.03em}
  .lvl3 .reading{font-size:14px;line-height:1.6}
  .meaning{font-size:17px;color:var(--ink);margin-top:14px;line-height:1.55;
    padding:0 4px;word-break:keep-all}
  .lvl3 .meaning{font-size:15px}
  .tap-hint{font-size:12px;color:var(--faint);margin-top:20px;letter-spacing:.04em}

  /* tappable pinyin words (sentence level) */
  .pyword{display:inline-block;cursor:pointer;border-radius:7px;padding:1px 4px;margin:1px 0;
    transition:background .12s,color .12s;-webkit-tap-highlight-color:transparent}
  .pyword:active{background:rgba(232,154,181,.18)}
  .pyword.sel{background:var(--rose-deep);color:var(--ink)}
  .word-tip{margin-top:14px;background:var(--panel2);border:1px solid var(--rose-d);
    border-radius:12px;padding:12px 14px;text-align:center;
    opacity:0;max-height:0;overflow:hidden;transition:.2s}
  .word-tip.show{opacity:1;max-height:200px;padding:12px 14px}
  .word-tip .wt-hz{font-family:"Songti SC","STSong","Noto Serif SC",serif;font-size:24px;
    font-weight:600;color:var(--ink)}
  .word-tip .wt-py{font-size:15px;color:var(--gold);margin-top:3px}
  .word-tip .wt-rd{font-size:13px;color:var(--rose);margin-top:1px}
  .word-tip .wt-mn{font-size:15px;color:var(--ink);margin-top:7px;word-break:keep-all}
  .word-tip .wt-hint{font-size:11px;color:var(--faint);margin-top:8px}

  /* speak button */
  .speak{margin-top:18px;background:var(--rose-deep);border:1px solid var(--rose-d);
    color:var(--ink);border-radius:99px;padding:11px 22px;font-size:14px;font-weight:600;
    cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px;transition:.15s}
  .speak:hover{background:var(--rose-d)}
  .speak:active{transform:scale(.97)}
  .speak.playing{background:var(--rose-d);box-shadow:0 0 0 4px rgba(212,83,126,.22)}
  .spk-ico{font-size:17px}

  /* nav */
  .nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:16px}
  .nav button{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
  .nav button:hover{border-color:var(--rose-d)}
  .nav button:active{transform:scale(.98)}
  .nav button:disabled{opacity:.35;cursor:default}
  .counter{font-size:14px;color:var(--muted);min-width:64px;text-align:center;font-variant-numeric:tabular-nums}

  /* known toggle */
  .known-row{display:flex;gap:8px;margin-top:12px}
  .known-row button{flex:1;border-radius:12px;padding:12px;font-size:13.5px;font-weight:600;
    cursor:pointer;font-family:inherit;border:1px solid var(--line);background:var(--panel);transition:.15s}
  .btn-again{color:var(--rose)}
  .btn-again:hover{border-color:var(--rose-d);background:var(--rose-deep)}
  .btn-got{color:var(--teal)}
  .btn-got:hover{border-color:var(--teal);background:rgba(93,202,165,.14)}

  /* settings */
  .settings{margin-top:20px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:14px 16px}
  .set-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);margin:8px 0}
  .set-row label{min-width:74px}
  .set-row input[type=range]{flex:1;accent-color:var(--rose-d)}
  .set-row .val{min-width:34px;text-align:right;color:var(--gold);font-variant-numeric:tabular-nums}
  .set-row select{background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:6px 8px;font-family:inherit;font-size:13px;flex:1}
  .warn-txt{font-size:11.5px;color:var(--warn);margin-top:6px;line-height:1.5}

  .done-card{text-align:center;padding:40px 20px}
  .done-card .big{font-size:40px}
  .done-card .msg{font-size:17px;margin-top:14px;color:var(--ink)}
  .done-card .sub{font-size:13px;color:var(--faint);margin-top:8px}

  .foot{text-align:center;font-size:11px;color:var(--faint);margin-top:28px;line-height:1.6}

  /* list view */
  .list-hint{font-size:12px;color:var(--faint);margin:6px 2px 12px;text-align:center;letter-spacing:.04em}
  .lrow{display:flex;align-items:center;gap:12px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;transition:.15s}
  .lrow.is-known{border-color:rgba(93,202,165,.4);background:rgba(93,202,165,.07)}
  .lrow .lnum{font-size:11px;color:var(--faint);min-width:22px;text-align:right;font-variant-numeric:tabular-nums}
  .lrow .lmain{flex:1;min-width:0}
  .lrow .lhanzi{font-family:"Songti SC","STSong","Noto Serif SC",serif;font-weight:600;
    color:var(--ink);line-height:1.3;word-break:keep-all}
  .list-w .lhanzi{font-size:23px}
  .list-p .lhanzi{font-size:20px}
  .list-s .lhanzi{font-size:18px}
  .lrow .lpy{font-size:13px;color:var(--gold);margin-top:3px;letter-spacing:.02em;line-height:1.4}
  .lrow .lrd{font-size:12.5px;color:var(--rose);margin-top:1px}
  .lrow .lmn{font-size:13.5px;color:var(--muted);margin-top:5px;line-height:1.45;word-break:keep-all}
  .lrow .lacts{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
  .lrow .lbtn{background:var(--panel2);border:1px solid var(--line);color:var(--muted);
    border-radius:9px;width:38px;height:34px;font-size:16px;cursor:pointer;display:flex;
    align-items:center;justify-content:center;padding:0;transition:.15s}
  .lrow .lbtn:hover{border-color:var(--rose-d);color:var(--ink)}
  .lrow .lbtn.fav-on{color:var(--gold)}
  .lrow .lbtn.kn-on{color:var(--teal);border-color:var(--teal)}
</style>
</head>
<body>
  <div class="top">
    <div class="cn-title">愛你</div>
    <div class="kr-title">아이니 · 단어장</div>
    <div class="artist">王心凌 Cyndi Wang · 2004</div>
  </div>

  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-label"><span id="progTxt">외운 단어 0</span><span id="progPct">0%</span></div>
  </div>

  <div class="levels" id="levels"></div>

  <div class="ctrl">
    <div class="seg" id="viewSeg">
      <button data-view="card" class="on">카드</button>
      <button data-view="list">리스트</button>
    </div>
    <div class="seg" id="modeSeg">
      <button data-mode="study" class="on">학습</button>
      <button data-mode="quiz">암기 테스트</button>
    </div>
    <button class="chip" id="favOnly">★ 별표만</button>
    <button class="chip" id="shuffleBtn">🔀 섞기</button>
    <button class="chip" id="autoBtn">🔊 자동읽기</button>
  </div>

  <div class="stage" id="cardStage">
    <div class="card" id="card" onclick="onCardTap(event)">
      <span class="pos-tag" id="posTag"></span>
      <button class="fav-btn" id="favBtn" onclick="toggleFav(event)">☆</button>
      <div class="hanzi" id="hanzi">—</div>
      <div class="reveal" id="reveal">
        <div class="pinyin" id="pinyin"></div>
        <div class="reading" id="reading"></div>
        <div class="meaning" id="meaning"></div>
      </div>
      <div class="tap-hint" id="tapHint">카드를 눌러 뜻 보기</div>
      <button class="speak" id="speakBtn" onclick="speakCard(event)">
        <span class="spk-ico">🔊</span><span>중국어 듣기</span>
      </button>
    </div>

    <div class="known-row">
      <button class="btn-again" onclick="markKnown(false)">↻ 다시</button>
      <button class="btn-got" onclick="markKnown(true)">✓ 외웠어요</button>
    </div>

    <div class="nav">
      <button id="prevBtn" onclick="go(-1)">‹ 이전</button>
      <span class="counter" id="counter">0 / 0</span>
      <button id="nextBtn" onclick="go(1)">다음 ›</button>
    </div>
  </div>

  <div class="list-stage" id="listStage" style="display:none">
    <div class="list-hint" id="listHint"></div>
    <div id="listBody"></div>
  </div>

  <div class="settings">
    <div class="set-row">
      <label>읽기 속도</label>
      <input type="range" id="rate" min="0.5" max="1.2" step="0.05" value="0.8">
      <span class="val" id="rateVal">0.8</span>
    </div>
    <div class="set-row">
      <label>목소리</label>
      <select id="voiceSel"></select>
    </div>
    <div class="warn-txt" id="voiceWarn"></div>
  </div>

  <div class="foot">
    발음은 브라우저 음성합성(TTS) 기능을 씁니다.<br>
    진행 상황은 이 기기에 자동 저장돼요.
  </div>

  [["明明", "míng míng", "밍밍", "분명히"], ["很想", "hěn xiǎng", "헌 샹", "무척 ~하고 싶다"], ["生氣", "shēng qì", "셩치", "화내다"], ["卻又", "què yòu", "췌 여우", "그런데도"], ["止不住", "zhǐ bu zhù", "즈부주", "멈추지 못하다"], ["笑意", "xiào yì", "샤오이", "웃음, 웃음기"]],
  [["在", "zài", "짜이", "~하는 중 / ~에서"], ["我", "wǒ", "워", "나"], ["的", "de", "더", "~의/~한 (조사)"], ["心裡", "xīn lǐ", "신리", "마음속"], ["你", "nǐ", "니", "너"], ["真的", "zhēn de", "전더", "정말로"], ["就是", "jiù shì", "지우스", "바로 ~이다"], ["唯一", "wéi yī", "웨이이", "유일한"]],
  [["愛", "ài", "아이", "사랑"], ["就是", "jiù shì", "지우스", "바로 ~이다"], ["有", "yǒu", "여우", "있다"], ["我", "wǒ", "워", "나"], ["常", "cháng", "창", "자주"], ["賴著", "lài zhe", "라이저", "기대다, 매달리다"], ["你", "nǐ", "니", "너"]],
  [["就", "jiù", "지우", "곧, 그럼"], ["這樣", "zhè yàng", "저양", "이렇게"], ["一天", "yì tiān", "이톈", "하루"], ["多", "duō", "둬", "더, 많이"], ["一點", "yì diǎn", "이뎬", "조금"]],
  [["慢慢地", "màn màn de", "만만디", "천천히"], ["累積", "lěi jī", "레이지", "쌓다, 쌓이다"], ["感覺", "gǎn jué", "간줴", "감정, 느낌"]],
  [["兩人", "liǎng rén", "량런", "두 사람"], ["的", "de", "더", "~의/~한 (조사)"], ["世界", "shì jiè", "스졔", "세상"], ["就", "jiù", "지우", "곧, 그럼"], ["能夠", "néng gòu", "넝거우", "~할 수 있다"], ["貼近", "tiē jìn", "티에진", "가까워지다"], ["一點", "yì diǎn", "이뎬", "조금"]],
  [["多", "duō", "둬", "더, 많이"], ["一點", "yì diǎn", "이뎬", "조금"], ["才會", "cái huì", "차이 후이", "비로소 ~하게 된다"], ["慢慢", "màn màn", "만만", "천천히"], ["發現", "fā xiàn", "파셴", "알아차리다, 발견하다"]],
];

const LEVELS = [
  {key:"w", name:"단어", sub:"낱말", data:WORDS, hasPos:true},
  {key:"p", name:"어절", sub:"구절", data:PHRASES, hasPos:false},
  {key:"s", name:"문장", sub:"가사 한 줄", data:SENTENCES, hasPos:false},
];

/* ============ STATE ============ */
const LS_KEY = "aini_deck_v1";
let store = load();
function load(){
  try{return JSON.parse(localStorage.getItem(LS_KEY))||{}}catch(e){return {}}
}
function save(){localStorage.setItem(LS_KEY, JSON.stringify(store))}
function known(){ store.known = store.known||{}; return store.known; }
function favs(){ store.favs = store.favs||{}; return store.favs; }

let curLevel = 0;
let viewMode = "card";    // card | list
let mode = "study";       // study | quiz
let favOnly = false;
let autoSpeak = false;
let order = [];           // index list into level data
let pos = 0;              // position in order
let revealed = false;

function itemId(lvl, i){ return LEVELS[lvl].key + i; }

/* ============ BUILD ORDER ============ */
function rebuildOrder(keepPos){
  const data = LEVELS[curLevel].data;
  let idxs = data.map((_,i)=>i);
  if(favOnly){
    idxs = idxs.filter(i=>favs()[itemId(curLevel,i)]);
  }
  order = idxs;
  pos = keepPos ? Math.min(pos, Math.max(0,order.length-1)) : 0;
  renderActive();
}
function renderActive(){
  if(viewMode==="list") renderList(); else render();
}
function shuffle(){
  for(let i=order.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [order[i],order[j]]=[order[j],order[i]];
  }
  pos=0; render();
}

/* ============ RENDER ============ */
const $=id=>document.getElementById(id);

function renderLevels(){
  const c=$("levels"); c.innerHTML="";
  LEVELS.forEach((L,i)=>{
    const total=L.data.length;
    let kn=0; L.data.forEach((_,j)=>{ if(known()[itemId(i,j)]) kn++; });
    const d=document.createElement("div");
    d.className="lvl"+(i===curLevel?" on":"");
    d.innerHTML=`<div class="num">LEVEL ${i+1}</div><div class="nm">${L.name}</div><div class="ct">${kn}/${total} 외움</div>`;
    d.onclick=()=>{ curLevel=i; revealed=false; renderLevels(); rebuildOrder(false); };
    c.appendChild(d);
  });
}

function render(){
  const card=$("card");
  const L=LEVELS[curLevel];
  card.className="card lvl"+(curLevel+1);

  if(order.length===0){
    $("hanzi").style.display="none";
    $("reveal").classList.remove("show");
    $("tapHint").style.display="none";
    $("speakBtn").style.display="none";
    $("posTag").textContent="";
    $("favBtn").style.display="none";
    card.innerHTML='<div class="done-card"><div class="big">★</div><div class="msg">별표한 항목이 없어요</div><div class="sub">카드의 ☆를 눌러 즐겨찾기에 추가하세요</div></div>';
    $("counter").textContent="0 / 0";
    updateProgress();
    return;
  }

  const i=order[pos];
  const row=L.data[i];
  const id=itemId(curLevel,i);

  // rebuild structure if it was replaced by done-card
  if(!$("hanzi")||!document.getElementById("hanzi")){ /* noop */ }
  card.innerHTML=`
    <span class="pos-tag" id="posTag"></span>
    <button class="fav-btn" id="favBtn" onclick="toggleFav(event)">☆</button>
    <div class="hanzi" id="hanzi">—</div>
    <div class="reveal" id="reveal">
      <div class="pinyin" id="pinyin"></div>
      <div class="reading" id="reading"></div>
      <div class="meaning" id="meaning"></div>
      <div class="word-tip" id="wordTip"></div>
    </div>
    <div class="tap-hint" id="tapHint">카드를 눌러 뜻 보기</div>
    <button class="speak" id="speakBtn" onclick="speakCard(event)">
      <span class="spk-ico">🔊</span><span>중국어 듣기</span>
    </button>`;

  $("hanzi").textContent=row[0];
  $("hanzi").style.display="";
  // sentence level: tappable pinyin words; others: plain
  if(L.key==="s" && SENT_TOKENS[i]){
    renderTappablePinyin(SENT_TOKENS[i]);
  } else {
    $("pinyin").textContent=row[1];
  }
  $("reading").textContent=row[2];
  $("meaning").textContent=row[3];
  $("posTag").textContent = L.hasPos&&row[4]?row[4]:`${L.name}`;
  $("favBtn").style.display="";
  $("favBtn").className="fav-btn"+(favs()[id]?" on":"");
  $("favBtn").textContent=favs()[id]?"★":"☆";

  // quiz mode hides reveal until tap; study auto-reveals
  revealed = (mode==="study");
  applyReveal();

  $("counter").textContent=`${pos+1} / ${order.length}`;
  $("prevBtn").disabled = pos===0;
  $("nextBtn").disabled = pos===order.length-1;

  if(autoSpeak){ setTimeout(()=>speak(row[0]),250); }
  updateProgress();
}

function applyReveal(){
  const rev=$("reveal"); if(!rev) return;
  if(revealed){ rev.classList.add("show"); $("tapHint").style.display="none"; }
  else{ rev.classList.remove("show"); $("tapHint").style.display=""; $("tapHint").textContent="카드를 눌러 뜻 보기"; }
}

function renderTappablePinyin(tokens){
  const py=$("pinyin"); if(!py) return;
  py.innerHTML="";
  tokens.forEach((t,idx)=>{
    const sp=document.createElement("span");
    sp.className="pyword";
    sp.textContent=t[1];           // pinyin of the word
    sp.setAttribute("data-idx",idx);
    sp.onclick=function(ev){ ev.stopPropagation(); pickWord(tokens,idx,this); };
    py.appendChild(sp);
    if(idx<tokens.length-1) py.appendChild(document.createTextNode(" "));
  });
  const tip=$("wordTip"); if(tip){ tip.classList.remove("show"); tip.innerHTML=""; }
}

function pickWord(tokens,idx,el){
  // highlight selected
  const py=$("pinyin");
  if(py) py.querySelectorAll(".pyword").forEach(x=>x.classList.remove("sel"));
  if(el) el.classList.add("sel");
  const t=tokens[idx];
  const tip=$("wordTip");
  if(tip){
    tip.innerHTML='<div class="wt-hz">'+esc(t[0])+'</div>'+
      '<div class="wt-py">'+esc(t[1])+'</div>'+
      '<div class="wt-rd">'+esc(t[2])+'</div>'+
      '<div class="wt-mn">'+esc(t[3])+'</div>'+
      '<div class="wt-hint">🔊 발음 재생됨 · 다른 단어를 눌러보세요</div>';
    tip.classList.add("show");
  }
  speak(t[0]);
}

function onCardTap(e){
  if(e.target.closest("#speakBtn")||e.target.closest("#favBtn")) return;
  if(!revealed){ revealed=true; applyReveal(); }
}

function updateProgress(){
  // overall across all levels
  let total=0, kn=0;
  LEVELS.forEach((L,i)=>{ total+=L.data.length; L.data.forEach((_,j)=>{ if(known()[itemId(i,j)]) kn++; }); });
  const pct=total?Math.round(kn/total*100):0;
  $("progFill").style.width=pct+"%";
  $("progTxt").textContent=`외운 단어 ${kn} / ${total}`;
  $("progPct").textContent=pct+"%";
}

/* ============ LIST VIEW ============ */
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function renderList(){
  const L=LEVELS[curLevel];
  const body=$("listBody");
  body.className="list-"+L.key;
  $("listHint").textContent = favOnly
    ? `★ 별표한 ${L.name} ${order.length}개`
    : `${L.name} 전체 ${order.length}개 · 🔊 발음 듣기 / ★ 별표 / ✓ 외움`;

  if(order.length===0){
    body.innerHTML='<div style="text-align:center;color:var(--faint);padding:40px 0;font-size:14px">★ 별표한 항목이 없어요</div>';
    updateProgress(); return;
  }
  let html="";
  order.forEach((i,n)=>{
    const row=L.data[i];
    const id=itemId(curLevel,i);
    const fav=!!favs()[id], kn=!!known()[id];
    html+=`<div class="lrow${kn?' is-known':''}" data-i="${i}">
      <div class="lnum">${n+1}</div>
      <div class="lmain">
        <div class="lhanzi">${esc(row[0])}</div>
        <div class="lpy">${esc(row[1])}</div>
        <div class="lrd">${esc(row[2])}</div>
        <div class="lmn">${esc(row[3])}</div>
      </div>
      <div class="lacts">
        <button class="lbtn" title="듣기" onclick="listSpeak(${i})">🔊</button>
        <button class="lbtn${fav?' fav-on':''}" title="별표" onclick="listFav(${i},this)">${fav?'★':'☆'}</button>
        <button class="lbtn${kn?' kn-on':''}" title="외움" onclick="listKnown(${i},this)">✓</button>
      </div>
    </div>`;
  });
  body.innerHTML=html;
  updateProgress();
}
function listSpeak(i){ speak(LEVELS[curLevel].data[i][0]); }
function listFav(i,btn){
  const id=itemId(curLevel,i);
  favs()[id]=!favs()[id]; if(!favs()[id]) delete favs()[id];
  save();
  const on=!!favs()[id];
  btn.classList.toggle("fav-on",on); btn.textContent=on?"★":"☆";
  if(favOnly && !on) renderList();
}
function listKnown(i,btn){
  const id=itemId(curLevel,i);
  known()[id]=!known()[id]; if(!known()[id]) delete known()[id];
  save();
  const on=!!known()[id];
  btn.classList.toggle("kn-on",on);
  btn.closest(".lrow").classList.toggle("is-known",on);
  renderLevels(); updateProgress();
}
function go(d){
  const n=pos+d;
  if(n<0||n>=order.length) return;
  pos=n; revealed=(mode==="study"); render();
}
function toggleFav(e){
  e.stopPropagation();
  const i=order[pos]; if(i===undefined) return;
  const id=itemId(curLevel,i);
  favs()[id]=!favs()[id]; if(!favs()[id]) delete favs()[id];
  save();
  $("favBtn").className="fav-btn"+(favs()[id]?" on":"");
  $("favBtn").textContent=favs()[id]?"★":"☆";
}
function markKnown(val){
  const i=order[pos]; if(i===undefined) return;
  const id=itemId(curLevel,i);
  if(val) known()[id]=true; else delete known()[id];
  save();
  renderLevels(); updateProgress();
  // advance
  if(pos<order.length-1){ go(1); }
  else { revealed=(mode==="study"); render(); }
}

/* ============ TTS ============ */
let voices=[], zhVoice=null;
let hasTTS=false;
try{ hasTTS = (typeof window!=="undefined") && ("speechSynthesis" in window) && !!window.speechSynthesis; }catch(e){ hasTTS=false; }

function loadVoices(){
  if(!hasTTS){
    const sel=$("voiceSel"); if(sel){ sel.innerHTML=""; const o=document.createElement("option"); o.textContent="이 브라우저는 음성 재생을 지원하지 않아요"; sel.appendChild(o); }
    const w=$("voiceWarn"); if(w) w.textContent="이 기기/브라우저에서는 음성 듣기가 지원되지 않습니다. 크롬 등 다른 브라우저로 열면 발음을 들을 수 있어요. (단어 학습 기능은 그대로 작동합니다.)";
    return;
  }
  try{ voices=window.speechSynthesis.getVoices()||[]; }catch(e){ voices=[]; }
  const zh=voices.filter(v=>/zh|cmn|chinese/i.test(v.lang)||/中文|普通话|國語|Chinese/i.test(v.name));
  const sel=$("voiceSel"); if(!sel) return; sel.innerHTML="";
  if(zh.length===0){
    const o=document.createElement("option"); o.textContent="중국어 음성 없음 (기본 사용)"; sel.appendChild(o);
    $("voiceWarn").textContent="이 브라우저/기기에 중국어 음성이 설치돼 있지 않습니다. 시스템 설정에서 중국어(普通话) 음성을 추가하면 발음이 정확해져요. (안드로이드: 설정>시스템>언어 및 입력>음성>TTS, iOS: 설정>손쉬운사용>음성콘텐츠)";
    zhVoice=null;
  } else {
    zh.forEach((v)=>{
      const o=document.createElement("option"); o.value=v.name; o.textContent=v.name+" ("+v.lang+")"; sel.appendChild(o);
    });
    const pref=zh.find(v=>/CN/i.test(v.lang))||zh[0];
    sel.value=pref.name; zhVoice=pref;
    $("voiceWarn").textContent="";
  }
  sel.onchange=function(){ zhVoice=voices.find(v=>v.name===sel.value)||null; };
}
try{ if(hasTTS) window.speechSynthesis.onvoiceschanged=loadVoices; }catch(e){}

function speak(text){
  if(!hasTTS) return;
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang = zhVoice?zhVoice.lang:"zh-CN";
    if(zhVoice) u.voice=zhVoice;
    const r=$("rate"); u.rate = r?parseFloat(r.value):0.8;
    u.pitch=1.0;
    const btn=$("speakBtn");
    if(btn){
      btn.classList.add("playing");
      u.onend=function(){ btn.classList.remove("playing"); };
      u.onerror=function(){ btn.classList.remove("playing"); };
    }
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function speakCard(e){
  if(e) e.stopPropagation();
  const i=order[pos]; if(i===undefined) return;
  speak(LEVELS[curLevel].data[i][0]);
}

/* ============ CONTROLS WIRING ============ */
$("viewSeg").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{
    $("viewSeg").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); viewMode=b.dataset.view;
    const isList = viewMode==="list";
    $("cardStage").style.display = isList?"none":"";
    $("listStage").style.display = isList?"":"none";
    $("modeSeg").style.opacity = isList?".4":"1";
    $("modeSeg").style.pointerEvents = isList?"none":"auto";
    $("shuffleBtn").style.display = isList?"none":"";
    rebuildOrder(false);
  };
});
$("modeSeg").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{
    $("modeSeg").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); mode=b.dataset.mode;
    revealed=(mode==="study"); render();
  };
});
$("favOnly").onclick=function(){ favOnly=!favOnly; this.classList.toggle("on",favOnly); rebuildOrder(false); };
$("shuffleBtn").onclick=shuffle;
$("autoBtn").onclick=function(){ autoSpeak=!autoSpeak; this.classList.toggle("on",autoSpeak);
  if(autoSpeak && viewMode==="card") speakCard(); };
$("rate").oninput=function(){ var n=parseFloat(this.value); $("rateVal").textContent=String(Math.round(n*100)/100); };
$("rateVal").textContent="0.8";

/* hide TTS-related controls if unavailable */
if(!hasTTS){
  var ab=$("autoBtn"); if(ab) ab.style.display="none";
  var sb=$("speakBtn"); if(sb) sb.style.display="none";
}

/* keyboard (card view only) */
document.addEventListener("keydown",e=>{
  if(viewMode==="list") return;
  if(e.key==="ArrowRight") go(1);
  else if(e.key==="ArrowLeft") go(-1);
  else if(e.key===" "){ e.preventDefault(); if(!revealed){revealed=true;applyReveal();} else speakCard(); }
  else if(e.key.toLowerCase()==="s") speakCard();
});

/* init — render first so the deck always shows, then voices */
renderLevels();
rebuildOrder(false);
try{ loadVoices(); }catch(e){}
</script>
</body>
</html>
